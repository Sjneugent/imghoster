# ImgHoster - Nginx HTTP-only configuration (no SSL)
# Place in /etc/nginx/sites-available/imghoster-insecure and symlink to sites-enabled/
# Use this only for local/LAN/testing where TLS termination is handled elsewhere.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Limits
    client_max_body_size 25M;

    # Logs
    access_log /var/log/nginx/imghoster-insecure.access.log;
    error_log  /var/log/nginx/imghoster-insecure.error.log;

    # Public image serving (proxied through Node for view tracking)
    location /i/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Node.js application (API + static frontend)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 30s;
    }

    # Baseline security headers (still useful without TLS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
