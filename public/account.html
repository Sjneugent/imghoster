<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImgHoster – Account Settings</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="navbar">
      <a class="brand" href="/upload.html">ImgHoster</a>
      <span class="spacer"></span>
      <span class="user-info" id="nav-user"></span>
      <button class="btn-logout" id="btn-logout" type="button">Log out</button>
    </nav>

    <aside class="sidebar">
      <nav>
        <a href="upload.html"><span class="nav-icon"></span> Upload</a>
        <a href="list.html"><span class="nav-icon"></span> My Images</a>
        <a href="albums.html"><span class="nav-icon"></span> Albums</a>
        <a href="stats.html"><span class="nav-icon"></span> Statistics</a>
        <a href="token.html"><span class="nav-icon"></span> API Token</a>
        <a href="2fa.html"><span class="nav-icon"></span> 2FA</a>
        <a href="account.html"><span class="nav-icon"></span> Account</a>
        <a href="dashboard.html" data-admin-only><span class="nav-icon"></span> Dashboard</a>
        <a href="flags-admin.html" data-admin-only><span class="nav-icon"></span> Content Flags</a>
      </nav>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Account Settings</h1>

      <div class="alert" id="alert" role="alert"></div>

      <!-- Display Name -->
      <div class="card" style="max-width:480px;margin-bottom:1.5rem">
        <h3 style="margin-top:0">Display Name</h3>
        <p style="font-size:.88rem;color:var(--text-muted);margin-bottom:1.2rem">
          Your display name is shown in profile areas. It does not change your login username.
        </p>
        <div class="alert" id="alert-name" role="alert"></div>
        <form id="form-name" novalidate>
          <div class="form-group">
            <label class="form-label" for="real-name">Display name</label>
            <input class="form-control" type="text" id="real-name" name="realName"
                   minlength="2" maxlength="120" placeholder="Your full name" autocomplete="name" />
          </div>
          <button class="btn btn-primary" type="submit">Save Name</button>
        </form>
      </div>

      <!-- Change Password -->
      <div class="card" style="max-width:480px">
        <h3 style="margin-top:0">Change Password</h3>
        <div class="alert" id="alert-pw" role="alert"></div>
        <form id="form-pw" novalidate>
          <div class="form-group">
            <label class="form-label" for="current-pw">Current password</label>
            <input class="form-control" type="password" id="current-pw" name="currentPassword"
                   autocomplete="current-password" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="new-pw">New password</label>
            <input class="form-control" type="password" id="new-pw" name="newPassword"
                   minlength="8" autocomplete="new-password" required />
            <small class="form-text text-muted">Minimum 8 characters.</small>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-pw">Confirm new password</label>
            <input class="form-control" type="password" id="confirm-pw" name="confirmPassword"
                   autocomplete="new-password" required />
          </div>
          <button class="btn btn-primary" type="submit">Change Password</button>
        </form>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/account.js"></script>
</body>
</html>
