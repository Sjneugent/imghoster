<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImgHoster – Dashboard</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="navbar">
      <a class="brand" href="/upload.html">ImgHoster</a>
      <span class="spacer"></span>
      <span class="user-info" id="nav-user"></span>
      <button class="btn-logout" id="btn-logout" type="button">Log out</button>
    </nav>

    <aside class="sidebar">
      <nav>
        <a href="upload.html"><span class="nav-icon"></span> Upload</a>
        <a href="list.html"><span class="nav-icon"></span> My Images</a>
        <a href="albums.html"><span class="nav-icon"></span> Albums</a>
        <a href="stats.html"><span class="nav-icon"></span> Statistics</a>
        <a href="token.html"><span class="nav-icon"></span> API Token</a>
        <a href="2fa.html"><span class="nav-icon"></span> 2FA</a>
        <a href="dashboard.html" data-admin-only><span class="nav-icon"></span> Dashboard</a>
        <a href="flags-admin.html" data-admin-only><span class="nav-icon"></span> Content Flags</a>
      </nav>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Dashboard</h1>

      <div class="alert" id="alert" role="alert"></div>

      <!-- Add user form -->
      <div class="card" style="max-width:480px;margin-bottom:1.5rem">
        <p style="font-weight:700;margin-bottom:1rem">Create new user</p>
        <form id="create-user-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="new-username">Username</label>
            <input class="form-control" type="text" id="new-username" autocomplete="off" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="new-password">Password</label>
            <input class="form-control" type="password" id="new-password" autocomplete="new-password"
                   minlength="8" required />
            <p class="form-hint">Minimum 8 characters.</p>
          </div>
          <div class="form-group">
            <label class="checkbox-row">
              <input type="checkbox" id="new-is-admin" />
              <span>Admin privileges</span>
            </label>
          </div>
          <button class="btn btn-primary" type="submit">Create user</button>
        </form>
      </div>

      <!-- Users table -->
      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table id="users-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Role</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Reset password modal -->
      <div id="pw-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center">
        <div class="card" style="width:360px;max-width:95vw;position:relative">
          <p style="font-weight:700;margin-bottom:1rem">Reset password</p>
          <p id="pw-modal-user" style="margin-bottom:1rem;color:var(--text-muted);font-size:.9rem"></p>
          <div class="form-group">
            <label class="form-label" for="new-pw">New password</label>
            <input class="form-control" type="password" id="new-pw" minlength="8" autocomplete="new-password" />
          </div>
          <div style="display:flex;gap:.5rem;justify-content:flex-end">
            <button class="btn btn-ghost" id="pw-modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="pw-modal-save">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
