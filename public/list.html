<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImgHoster – My Images</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="navbar">
      <a class="brand" href="/upload.html">ImgHoster</a>
      <span class="spacer"></span>
      <span class="user-info" id="nav-user"></span>
      <button class="btn-logout" id="btn-logout" type="button">Log out</button>
    </nav>

    <aside class="sidebar">
      <nav>
        <a href="upload.html"><span class="nav-icon"></span> Upload</a>
        <a href="list.html"><span class="nav-icon"></span> My Images</a>
        <a href="albums.html"><span class="nav-icon"></span> Albums</a>
        <a href="stats.html"><span class="nav-icon"></span> Statistics</a>
        <a href="token.html"><span class="nav-icon"></span> API Token</a>
        <a href="2fa.html"><span class="nav-icon"></span> 2FA</a>
        <a href="account.html"><span class="nav-icon"></span> Account</a>
        <a href="dashboard.html" data-admin-only><span class="nav-icon"></span> Dashboard</a>
      </nav>
    </aside>

    <main class="main-content">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <h1 class="page-title" style="margin:0">My Images</h1>
        <span class="spacer" style="flex:1"></span>
        <label id="show-all-label" style="display:none;align-items:center;gap:.4rem;font-size:.88rem">
          <input type="checkbox" id="show-all" /> Show all users
        </label>
        <a class="btn btn-primary btn-sm" href="upload.html">Upload new</a>
      </div>

      <div class="search-bar" style="margin-bottom:1rem">
        <input type="text" id="search-input" class="form-control" placeholder="Search images by slug, filename, or user..." autocomplete="off" />
      </div>

      <div class="alert" id="alert" role="alert"></div>

      <div id="bulk-toolbar" class="bulk-toolbar" style="display:none">
        <label class="checkbox-row" style="font-size:.88rem;font-weight:600">
          <input type="checkbox" id="select-all" /> Select all
        </label>
        <span id="selection-count" style="font-size:.85rem;color:var(--text-muted)"></span>
        <span style="flex:1"></span>
        <button class="btn btn-primary btn-sm" id="btn-download" disabled>Download selected as ZIP</button>
        <button class="btn btn-danger btn-sm" id="btn-delete-selected" disabled>Delete selected</button>
      </div>

      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table id="images-table">
            <thead>
              <tr>
                <th style="width:36px"><input type="checkbox" id="select-all-head" title="Select all" /></th>
                <th>Preview</th>
                <th>Slug / URL</th>
                <th id="col-user" style="display:none">User</th>
                <th>Size</th>
                <th>Views</th>
                <th>Uploaded</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="images-tbody">
              <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/list.js"></script>
</body>
</html>
